services:
  backend:
    build:
      context: ./backend
      args:
        INSTALL_MUJOCO: ${INSTALL_MUJOCO:-false}
    container_name: remote-platform-backend
    restart: unless-stopped
    environment:
      - PHYSICS_ENGINE=${PHYSICS_ENGINE:-lightweight}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: remote-platform-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
