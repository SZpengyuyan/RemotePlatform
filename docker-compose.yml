services:
  backend:
    build:
      context: ./backend
    container_name: remote-platform-backend
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: remote-platform-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
